version: 2

models:
  - name: int_sample
    config:
      alias: fct_sample
      contract:
        enforced: true
      # event_time: date
    docs:
      show: true
      node_color: "silver"
    description: >
      Results from test

    constraints:
      - type: primary_key
        columns: [id]
        warn_unenforced: true
        name: "First Constraint"

    columns:
      - name: id
        data_type: bigint
      - name: name
        data_type: varchar
      - name: date
        data_type: timestamp
