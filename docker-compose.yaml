services:
  trino-gateway:
    image: trinodb/trino-gateway:latest
    ports:
      - "8080:8080"
    volumes:
      - ./gateway-config.yaml:/etc/trino-gateway/config.yaml
    env_file:
      - .env
    depends_on:
      backend:
        condition: service_healthy
      trino:
        condition: service_started

  backend:
    image: postgres:18.3
    # ports:
    # - "5432:5432"
    env_file:
      - .env
    healthcheck:
      # Need user and database name to check PostgreSQL server status
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB || exit 1",
        ]
      interval: 1s
      timeout: 1s
      retries: 60
      start_period: 10s
    volumes:
      - backend:/var/lib/postgresql

  trino:
    image: trinodb/trino:latest
    hostname: trino
    volumes:
      - ./trino-coordinator/etc:/etc/trino
    env_file:
      - .env

  trino-worker:
    image: trinodb/trino:latest
    volumes:
      - ./trino-worker/etc:/etc/trino
    env_file:
      - .env

  # jaeger:
  #   image: jaegertracing/all-in-one:latest
  #   container_name: jaeger
  #   ports:
  #     - "16686:16686"
  #     - "4317:4317"
  #   environment:
  #     COLLECTOR_OTLP_ENABLED: "true"

  opa:
    image: openpolicyagent/opa:1.15.0
    # ports:
    # - "8181:8181"
    command:
      [
        "run",
        "--server",
        "--log-level",
        "debug",
        "--addr",
        ":8181",
        "/policies",
        "--watch",
      ]
    volumes:
      - ./policies:/policies
    env_file:
      - .env

volumes:
  backend:
